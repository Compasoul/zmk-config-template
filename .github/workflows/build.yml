name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Create build.yaml if missing
        run: |
          if [ ! -f config/build.yaml ]; then
            echo -e "type: build\ntargets:\n  - board: nice_nano_v2\n    shield: p48n" > config/build.yaml
          fi

      - name: ZMK Standalone Build Engine
        uses: bmcgavin/zmk-config-actions@main
        with:
          mode: build
          config_path: config

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: p48n_firmware
          path: firmware/
