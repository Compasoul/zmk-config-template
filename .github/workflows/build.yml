name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west west zephyr-export || west zephyr-export

      - name: Compile Firmware (Force Upper/Lower Compatibility)
        run: |
          # 无论原作者定义的是大写 P48N 还是小写 p48n，我们让编译器同时去轰炸这两条命令！
          echo "Trying lowercase shield name..."
          west build -s zmk/app -b nice_nano -- -DSHIELD=p48n -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" || \
          (echo "Trying uppercase shield name..." && \
          west build -s zmk/app -b nice_nano -- -DSHIELD=P48N -DZMK_CONFIG="${GITHUB_WORKSPACE}/config")

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: p48n_firmware
          path: build/zephyr/zmk.uf2
